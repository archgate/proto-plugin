name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # Suppress archgate CLI telemetry in CI so in-development cli_version values
  # don't pollute PostHog product-usage metrics. Harmless for workflows that
  # don't run the CLI.
  ARCHGATE_TELEMETRY: "0"

jobs:
  build:
    name: Build WASM plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: moonrepo/build-wasm-plugin@v0
        id: build

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            builds/*.wasm
            builds/*.sha256
          fail_on_unmatched_files: true

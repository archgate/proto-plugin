name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # Suppress archgate CLI telemetry in CI so in-development cli_version values
  # don't pollute PostHog product-usage metrics. Harmless for workflows that
  # don't run the CLI.
  ARCHGATE_TELEMETRY: "0"

jobs:
  build:
    name: Build WASM plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: moonrepo/build-wasm-plugin@60ff6f68ae0e0b4dc4b959835cd84b8d535403c2 # v0
        id: build

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            builds/*.wasm
            builds/*.sha256
          fail_on_unmatched_files: true
